name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────
  # Windows (.msi)
  # ──────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Rust セットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust キャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: ExifTool / ffmpeg インストール & 配置
        shell: pwsh
        run: |
          # ExifTool: 公式サイトから最新版を直接ダウンロード（chocoシムを避ける）
          $etPage = Invoke-WebRequest -Uri "https://exiftool.org/" -UseBasicParsing
          $etVer  = [regex]::Match($etPage.Content, 'exiftool-(\d+\.\d+)_64\.zip').Groups[1].Value
          Invoke-WebRequest -Uri "https://exiftool.org/exiftool-${etVer}_64.zip" -OutFile exiftool.zip
          Expand-Archive exiftool.zip -DestinationPath exiftool_tmp
          $etExe = Get-ChildItem exiftool_tmp -Recurse -Filter "*.exe" | Select-Object -First 1
          # ffmpeg: DLL不要なstaticビルド
          $ffUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $ffUrl -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $ffExe = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          Move-Item $etExe.FullName "src-tauri/binaries/exiftool-x86_64-pc-windows-msvc.exe" -Force
          Move-Item $ffExe.FullName "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"   -Force
          Remove-Item exiftool.zip, exiftool_tmp, ffmpeg.zip, ffmpeg_tmp -Recurse -Force

      - run: npm install

      - name: Tauri ビルド (Windows MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Google Takeout Connect ${{ github.ref_name }}"
          releaseBody: |
            ## Google Takeout Connect v0.1.0

            Google Takeout でエクスポートした写真・動画ファイルに、撮影日時などのメタデータを書き戻すデスクトップアプリです。

            ---

            ## 主な機能

            - **撮影日時の復元**: Google Takeout の JSON サイドカーファイルから撮影日時を読み取り、メディアファイルに書き戻します
            - **対応形式**: JPEG / PNG / HEIC / WebP / TIFF / DNG / CR2 / NEF / ARW などの画像、MP4 / MOV / MKV などの動画
            - **ファイルタイムスタンプ更新**: エクスプローラーの「更新日時」「作成日時」も撮影日時に変更
            - **スキップ理由の表示**: JSON が見つからないファイルや対応外ファイルをログで確認可能
            - **ExifTool・ffmpeg 同梱**: 別途インストール不要ですぐに使えます

            ---

            ## ダウンロード

            | OS | ファイル |
            |---|---|
            | Windows (64bit) | `Google.Takeout.Connect_0.1.0_x64_ja-JP.msi` |
            | macOS (Apple Silicon / M1以降) | `Google.Takeout.Connect_0.1.0_aarch64.dmg` |
            | macOS (Intel) | `Google.Takeout.Connect_0.1.0_x64.dmg` |

            ---

            ## インストール方法

            ### Windows
            1. `.msi` ファイルをダブルクリック
            2. 画面の指示に従ってインストール
            > SmartScreen の警告が出た場合は「詳細情報」→「実行」を選択してください

            ### macOS
            1. `.dmg` ファイルを開く
            2. アプリを `Applications` フォルダにドラッグ
            > 初回起動時に「開発元を確認できない」と表示された場合は、`システム設定` → `プライバシーとセキュリティ` から「このまま開く」を選択してください

            ---

            ## 使い方

            1. アプリを起動
            2. 「入力フォルダ」に Google Takeout を展開したフォルダを選択
            3. 「出力フォルダ」に書き出し先を選択
            4. 「処理開始」をクリック
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  # ──────────────────────────────────────────
  # macOS Apple Silicon (.dmg / aarch64)
  # ──────────────────────────────────────────
  build-macos-arm:
    name: macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Rust セットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust キャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: ExifTool / ffmpeg インストール & 配置
        run: |
          brew install exiftool ffmpeg
          mkdir -p src-tauri/binaries
          cp "$(which exiftool)" src-tauri/binaries/exiftool-aarch64-apple-darwin
          cp "$(which ffmpeg)"   src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/binaries/*-apple-darwin

      - run: npm install

      - name: Tauri ビルド (macOS ARM)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Google Takeout Connect ${{ github.ref_name }}"
          releaseDraft: true
          args: --target aarch64-apple-darwin --bundles dmg

  # ──────────────────────────────────────────
  # macOS Intel (.dmg / x86_64)
  # ──────────────────────────────────────────
  build-macos-intel:
    name: macOS (Intel)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Rust セットアップ
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust キャッシュ
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: ExifTool / ffmpeg インストール & 配置
        run: |
          brew install exiftool ffmpeg
          mkdir -p src-tauri/binaries
          cp "$(which exiftool)" src-tauri/binaries/exiftool-x86_64-apple-darwin
          cp "$(which ffmpeg)"   src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          chmod +x src-tauri/binaries/*-apple-darwin

      - run: npm install

      - name: Tauri ビルド (macOS Intel)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Google Takeout Connect ${{ github.ref_name }}"
          releaseDraft: true
          args: --target x86_64-apple-darwin --bundles dmg
